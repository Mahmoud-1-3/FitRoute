name: fit_route
description: "FitRoute — Empowering Your Health Journey"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0-127.0.dev

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^1.1.1
  percent_indicator: ^4.2.5
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Code generation annotations
  json_annotation: ^4.8.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  json_serializable: 6.6.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
